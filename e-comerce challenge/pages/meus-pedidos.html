<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Arte & Mimo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../ArquivosCSS/styles.css">
    <link rel="stylesheet" href="../ArquivosCSS/pedidos.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-gift"></i> Arte & Mimo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="carrinho.html">
                            <i class="fas fa-shopping-cart"></i>
                            <span id="cartCount" class="cart-badge">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="navLogin">
                        <a class="nav-link" href="login.html">
                            <button class="btn btn-primary btn-sm px-3">Entrar</button>
                        </a>
                    </li>
                    <li class="nav-item dropdown hidden" id="navUser">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="userName">Usuário</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="meus-pedidos.html">Meus Pedidos</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()">Sair</a></li>
                        </ul>
                    </li>
                    <li class="nav-item hidden" id="navAdmin">
                        <a class="nav-link" href="admin.html">
                            <i class="fas fa-cog"></i> Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="py-5">
        <div class="container">
            <div class="row mb-4">
                <div class="col-12">
                    <h1 class="h2">Meus Pedidos</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="../index.html">Início</a></li>
                            <li class="breadcrumb-item active">Meus Pedidos</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Buscar pedido..." id="searchOrders">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-6">
                    <select class="form-select" id="filterStatus">
                        <option value="all">Todos os status</option>
                        <option value="confirmado">Confirmado</option>
                        <option value="preparando">Preparando</option>
                        <option value="enviado">Enviado</option>
                        <option value="entregue">Entregue</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
            </div>

            <!-- LISTA DE PEDIDOS -->
            <div id="pedidosContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando pedidos...</span>
                    </div>
                    <p class="mt-3">Carregando seus pedidos...</p>
                </div>
            </div>

            <!-- SEM PEDIDOS -->
            <div id="semPedidos" class="hidden text-center py-5">
                <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                <h4>Nenhum pedido encontrado</h4>
                <p class="text-muted mb-4">Você ainda não fez nenhum pedido.</p>
                <a href="produtos.html" class="btn btn-primary btn-lg">
                    <i class="fas fa-shopping-bag me-2"></i> Fazer Primeira Compra
                </a>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <!-- Footer igual às outras páginas -->
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <!-- ✅ CORRIGIDO: Carregando como módulo ES6 -->
    <script type="module" src="../js/meus-pedidos.js"></script>
    
    <script type="module">
        import { atualizarNavbar, logout } from '../js/auth-system.js';
        
        // Atualiza navbar automaticamente
        atualizarNavbar();
        
        // Torna logout global
        window.logout = logout;
    </script>
</body>
</html>
